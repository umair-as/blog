<script>
  (function () {
    function initTocActiveState() {
      var toc = document.querySelector('.toc');
      if (!toc) return;

      var tocLinks = Array.prototype.slice.call(
        toc.querySelectorAll('.inner a[href^="#"]')
      );
      if (!tocLinks.length) return;

      var headingMap = new Map();
      tocLinks.forEach(function (link) {
        var id = decodeURIComponent(link.getAttribute('href').slice(1));
        var heading = document.getElementById(id);
        if (heading) headingMap.set(heading, link);
      });

      if (!headingMap.size) return;

      var observer = new IntersectionObserver(
        function (entries) {
          entries.forEach(function (entry) {
            var link = headingMap.get(entry.target);
            if (!link) return;
            if (entry.isIntersecting) {
              tocLinks.forEach(function (l) { l.classList.remove('is-active'); });
              link.classList.add('is-active');
            }
          });
        },
        { rootMargin: "-20% 0px -70% 0px", threshold: 0.01 }
      );

      headingMap.forEach(function (_, heading) {
        observer.observe(heading);
      });
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initTocActiveState);
    } else {
      initTocActiveState();
    }
  })();
</script>
