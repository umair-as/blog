baseURL: https://umair-as.github.io/blog/
locale: en-us
title: Umair Ahmed Shah
theme: PaperMod

paginate: 10

params:
  env: production
  author: Umair Ahmed Shah
  description: "Systems software engineer writing about real projects — embedded Linux, wireless protocols, infrastructure, and whatever else breaks at 2am."
  defaultTheme: dark
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: true
  TocOpen: false
  ShowWordCount: false
  comments: false

  homeInfoParams:
    Title: "Umair Ahmed Shah"
    Content: >
      Building IoT gateways, custom Linux distributions, and wireless firmware
      — then writing about what actually happened.

  socialIcons:
    - name: github
      url: "https://github.com/umair-as"
    - name: linkedin
      url: "https://de.linkedin.com/in/umairahmedshah"

  assets:
    favicon: "/favicon.ico"

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

menu:
  main:
    - identifier: archive
      name: Archive
      url: /archives/
      weight: 5
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 10
    - identifier: search
      name: Search
      url: /search/
      weight: 15
    - identifier: about
      name: About
      url: /about/
      weight: 20

outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  highlight:
    codeFences: true
    guessSyntax: true
    lineNos: false
    lineNumbersInTable: false
    style: nord
    noClasses: true
