baseURL: https://umair-as.github.io/blog/
locale: en-us
title: "Umair's Systems Notebook"
theme: PaperMod

paginate: 10

params:
  env: production
  author: Umair Ahmed Shah
  description: "Systems software engineer writing about real projects — embedded Linux, wireless protocols, infrastructure, and whatever else breaks at 2am."
  defaultTheme: dark
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: true
  TocOpen: true
  UseHugoToc: true
  # ToC style variants: inline-card | right-rail
  TocVariant: right-rail
  ShowWordCount: false
  ShowRssButtonInSectionTermList: true
  comments: false
  hideFooter: true

  # Post series support — renders a series box at the top of each post
  ShowSeriesNavigation: true

  homeInfoParams:
    Title: "Umair's Systems Notebook"
    Content: >
      By Umair Ahmed Shah. Building IoT gateways, custom Linux distributions,
      and wireless firmware — then writing about what actually happened.

  label:
    iconSVG: >
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="logo" width="24" height="24">
        <rect x="8" y="8" width="48" height="48" rx="8" fill="none" stroke="#C2762A" stroke-width="4"></rect>
        <path d="M22 24 L22 40 C22 44 24 46 26 46 L38 46 C40 46 42 44 42 40 L42 24" stroke="#C2762A" stroke-width="4" fill="none" stroke-linecap="round"></path>
      </svg>

  socialIcons:
    - name: github
      url: "https://github.com/umair-as"
    - name: linkedin
      url: "https://de.linkedin.com/in/umairahmedshah"
    - name: rss
      url: "/blog/index.xml"

  assets:
    favicon: "favicon.ico"

  # Schema.org structured data — helps search engines understand the site
  schema:
    publisherType: Person

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 100
    threshold: 0.22
    minMatchCharLength: 2
    keys: ["title", "permalink", "summary", "content"]

menu:
  main:
    - identifier: archive
      name: Archive
      url: /archives/
      weight: 5
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 10
    - identifier: search
      name: Search
      url: /search/
      weight: 15
    - identifier: about
      name: About
      url: /about/
      weight: 20

outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  tableOfContents:
    startLevel: 2
    endLevel: 2
    ordered: false
  highlight:
    codeFences: true
    guessSyntax: true
    lineNos: false
    lineNumbersInTable: false
    style: nord
    noClasses: true
